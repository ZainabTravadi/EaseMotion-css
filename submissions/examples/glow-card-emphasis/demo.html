<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Card Emphasis - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Glow Card Emphasis</h1>
    <p>A premium, breathing neon glow effect that adds visual prominence to cards during emphasis loops.</p>
    
    <div class="card-container">
      <div id="targetCard" class="glow-card">
        <h3 class="card-title">Neon Pulse Card</h3>
        <p class="card-desc">Hover this card or click the button below to toggle the looping glow emphasis breathing effect.</p>
      </div>
    </div>
    
    <button id="toggleBtn" class="btn">Toggle Glow Loop</button>
  </div>

  <script>
    const targetCard = document.getElementById('targetCard');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', () => {
      const isActive = targetCard.classList.toggle('emphasis-active');
      if (isActive) {
        toggleBtn.textContent = 'Disable Glow Loop';
        toggleBtn.classList.add('btn-active');
      } else {
        toggleBtn.textContent = 'Toggle Glow Loop';
        toggleBtn.classList.remove('btn-active');
      }
    });
  </script>
</body>
</html>
